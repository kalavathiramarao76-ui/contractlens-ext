<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Shine -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Document body -->
  <rect x="30" y="20" width="52" height="68" rx="4" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Document fold corner -->
  <path d="M70 20 L82 20 L82 32 Z" fill="white" opacity="0.3"/>
  <path d="M70 20 L70 32 L82 32" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>
  <!-- Document lines -->
  <line x1="40" y1="42" x2="66" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="52" x2="60" y2="52" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="62" x2="64" y2="62" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="72" x2="56" y2="72" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Shield with checkmark overlay (bottom right) -->
  <path d="M80 60 L100 68 L100 86 Q100 100 80 108 Q60 100 60 86 L60 68 Z" fill="#be123c" stroke="white" stroke-width="3" stroke-linejoin="round"/>
  <!-- Checkmark inside shield -->
  <polyline points="70,82 78,90 92,74" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
