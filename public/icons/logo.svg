<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#be123c"/>
      <stop offset="100%" stop-color="#881337"/>
    </linearGradient>
    <linearGradient id="bgSheen" x1="0%" y1="0%" x2="40%" y2="40%">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e11d48" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="checkGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#bgSheen)"/>
  <g filter="url(#shadow)">
    <!-- Shield shape (modern heraldic) -->
    <path d="M64,28 L92,38 C94,39 96,42 96,44 L96,68 C96,82 82,94 64,102 C46,94 32,82 32,68 L32,44 C32,42 34,39 36,38 Z"
          fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>
    <!-- Inner shield line -->
    <path d="M64,34 L88,42 C89,42.5 90,44 90,45 L90,67 C90,78 78,88 64,95 C50,88 38,78 38,67 L38,45 C38,44 39,42.5 40,42 Z"
          fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.25"/>
    <!-- Contract text lines inside shield -->
    <g opacity="0.5">
      <line x1="46" y1="50" x2="82" y2="50" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="46" y1="58" x2="78" y2="58" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="46" y1="66" x2="72" y2="66" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="46" y1="74" x2="66" y2="74" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <!-- Magnifying glass -->
    <circle cx="82" cy="80" r="14" fill="url(#lensGlow)" stroke="#ffffff" stroke-width="2.5" opacity="0.95"/>
    <!-- Glass lens inner highlight -->
    <path d="M74,74 Q78,70 84,72" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <!-- Glass handle -->
    <line x1="92" y1="90" x2="100" y2="98" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Checkmark inside lens -->
    <g filter="url(#checkGlow)">
      <polyline points="75,80 80,86 90,74" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    </g>
  </g>
</svg>